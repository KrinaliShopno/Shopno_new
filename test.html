<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Carousel</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #070707;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  color: #fff;
}

/* BIG BG TEXT */
.about-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(8rem, 20vw, 18rem);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  color: transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.05);
  pointer-events: none;
}

/* CONTAINER */
.carousel-container {
  width: 100%;
  max-width: 1200px;
  height: 450px;
  position: relative;
  perspective: 1200px;
  overflow: hidden;
}

/* TRACK */
.carousel-track {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

/* CARD */
.card {
  position: absolute;
  width: 280px;
  height: 380px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 16px;
  overflow: hidden;
  background: #111;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO */
.member-info {
  text-align: center;
  margin-top: 30px;
}

.member-name {
  font-family: 'Bebas Neue';
  font-size: 3rem;
}

.member-role {
  color: #aaa;
  letter-spacing: 2px;
  font-size: 0.9rem;
}

/* DOTS */
.dots {
  display: flex;
  gap: 10px;
  margin-top: 30px;
}

.dot {
  width: 8px;
  height: 8px;
  background: #555;
  border-radius: 50%;
  cursor: pointer;
}

.dot.active {
  background: #fff;
  transform: scale(1.5);
}

/* ARROWS */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 3rem;
  background: none;
  border: none;
  color: #888;
  cursor: pointer;
  z-index: 10;
}

.nav-arrow:hover {
  color: #fff;
}

.left { left: 5%; }
.right { right: 5%; }

/* MOBILE */
@media(max-width:768px){
  .card {
    width: 220px;
    height: 300px;
  }
}

</style>
</head>

<body>

<h1 class="about-title">OUR TEAM</h1>

<div class="carousel-container">

  <button class="nav-arrow left">‹</button>

  <div class="carousel-track">

    <div class="card"><img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=800"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=800"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=800"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1655249481446-25d575f1c054?w=800"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=800"></div>

  </div>

  <button class="nav-arrow right">›</button>

</div>

<div class="member-info">
  <h2 class="member-name">Emily Kim</h2>
  <p class="member-role">Founder</p>
</div>

<div class="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>

const members = [
  { name:"Emily Kim", role:"Founder"},
  { name:"Michael Steward", role:"Creative Director"},
  { name:"Emma Rodriguez", role:"Lead Developer"},
  { name:"Julia Gimmel", role:"UX Designer"},
  { name:"Lisa Anderson", role:"Marketing Manager"},
  { name:"James Wilson", role:"Product Manager"}
];

const cards = document.querySelectorAll(".card");
const dots = document.querySelectorAll(".dot");
const nameEl = document.querySelector(".member-name");
const roleEl = document.querySelector(".member-role");

let index = 0;
let animating = false;

function update(newIndex){

  if(animating) return;
  animating = true;

  index = (newIndex + cards.length) % cards.length;

  const isMobile = window.innerWidth < 768;
  const gap1 = isMobile ? 120 : 200;
  const gap2 = isMobile ? 220 : 360;

  cards.forEach((card,i)=>{

    let offset = i - index;
    if(offset > cards.length/2) offset -= cards.length;
    if(offset < -cards.length/2) offset += cards.length;

    let x=0,z=0,scale=1,opacity=1;

    if(offset===0){
      scale=1.1;
    }
    else if(offset===1){
      x=gap1; z=-100; scale=0.9; opacity=0.9;
    }
    else if(offset===-1){
      x=-gap1; z=-100; scale=0.9; opacity=0.9;
    }
    else if(offset===2){
      x=gap2; z=-300; scale=0.8; opacity=0.6;
    }
    else if(offset===-2){
      x=-gap2; z=-300; scale=0.8; opacity=0.6;
    }
    else{
      x=offset>0?500:-500;
      opacity=0;
      scale=0.5;
    }

    gsap.to(card,{
      x:x,
      z:z,
      scale:scale,
      opacity:opacity,
      duration:0.8,
      ease:"power3.out"
    });

  });

  gsap.to(".member-info",{
    opacity:0,
    y:10,
    duration:0.3,
    onComplete:()=>{
      nameEl.textContent = members[index].name;
      roleEl.textContent = members[index].role;
      gsap.to(".member-info",{opacity:1,y:0});
    }
  });

  dots.forEach((d,i)=>d.classList.toggle("active",i===index));

  setTimeout(()=>animating=false,800);
}

document.querySelector(".left").onclick=()=>update(index-1);
document.querySelector(".right").onclick=()=>update(index+1);

dots.forEach((d,i)=>d.onclick=()=>update(i));

update(0);

</script>

</body>
</html>
